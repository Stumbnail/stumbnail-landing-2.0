    - generic [ref=e289]:
      - generic [ref=e290]:
        - paragraph [ref=e291]: FAQ
        - heading "Frequently asked questions" [level=2] [ref=e292]
        - paragraph [ref=e293]: Everything you need to know about how Stumbnail fits into a thumbnail workflow.
      - generic [ref=e294]:
        - generic [ref=e295]:
          - button "What does your thumbnail creator actually do?" [ref=e296]:
            - text: What does your thumbnail creator actually do?
            - img [ref=e298]
          - paragraph [ref=e301]: We're an AI YouTube thumbnail generator that turns your ideas into click-worthy visuals in seconds. Just describe what you want or paste your video title, and our AI generates a clean, creator-ready thumbnail. You can adjust colors, personas, text, and layout without starting over. It's built to give you fast results while keeping full creative control in your hands.
        - generic [ref=e302]:
          - button "Do I need design skills to use this?" [ref=e303]:
            - text: Do I need design skills to use this?
            - img [ref=e305]
          - paragraph [ref=e308]: Not at all. The whole point is that you don't need to know Photoshop or spend hours learning design software. If you can type a sentence, you can make a thumbnail. Our thumbnail maker AI handles the heavy lifting like composition, style, and readability so you can focus on your content.
        - generic [ref=e309]:
          - button "What's the right YouTube thumbnail size?" [ref=e310]:
            - text: What's the right YouTube thumbnail size?
            - img [ref=e312]
          - paragraph [ref=e315]: The recommended YouTube thumbnail size is 1280 × 720 pixels with a 16:9 aspect ratio. This is the standard that YouTube expects, and all thumbnails we generate follow this spec automatically. You don't need to resize anything. What you download is ready to upload.
        - generic [ref=e316]:
          - button "Can I generate a thumbnail from my video?" [ref=e317]:
            - text: Can I generate a thumbnail from my video?
            - img [ref=e319]
          - paragraph [ref=e322]: Yes. You can generate a thumbnail from video by giving us context about what your video covers. Describe the topic, the vibe, or paste your title and we'll create a thumbnail that fits. You're not limited to screenshots; you get original, AI-generated visuals designed for clicks.
        - generic [ref=e323]:
          - button "Do you offer a free plan?" [ref=e324]:
            - text: Do you offer a free plan?
            - img [ref=e326]
          - paragraph [ref=e329]: We’ve discontinued the free tier. With our small budget, we couldn’t fund it anymore, so we can’t keep providing free credits. We’re really sorry. You’re still welcome to try Stumbnail with a paid plan.
        - generic [ref=e330]:
          - button "Can I use this for gaming thumbnails?" [ref=e331]:
            - text: Can I use this for gaming thumbnails?
            - img [ref=e333]
          - paragraph [ref=e336]: Absolutely. We support gaming thumbnail creation for any game like Minecraft, Fortnite, Call of Duty, whatever you play. Just describe the scene or vibe you want, and the AI generates something that fits the energy of gaming content.
        - generic [ref=e337]:
          - button "Do you have thumbnail templates I can use?" [ref=e338]:
            - text: Do you have thumbnail templates I can use?
            - img [ref=e340]
          - paragraph [ref=e343]: We take a different approach. Instead of static YouTube thumbnail templates, our AI generates fresh designs based on your input every time. This means your thumbnails don't look like everyone else's, and you're not stuck tweaking a template that doesn't quite fit.
        - generic [ref=e344]:
          - button "Can I add text to my thumbnails?" [ref=e345]:
            - text: Can I add text to my thumbnails?
            - img [ref=e347]
          - paragraph [ref=e350]: Yes. Our thumbnail text generator lets you add bold, readable text directly on your thumbnail. You control the wording, size, and placement. The AI suggests layouts that keep text legible even at small sizes because that's where most people see thumbnails first.
        - generic [ref=e351]:
          - button "How is this different from Canva or Photoshop?" [ref=e352]:
            - text: How is this different from Canva or Photoshop?
            - img [ref=e354]
          - paragraph [ref=e357]: Canva and Photoshop are general design tools. We're built specifically for YouTube creators. Our AI thumbnail maker understands what makes thumbnails click like faces, contrast, and text placement, then generates designs with that in mind. No templates to dig through, no learning curve. Just describe and generate.

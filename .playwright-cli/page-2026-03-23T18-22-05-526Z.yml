          - heading "Frequently asked questions" [level=2] [ref=e288]
          - paragraph [ref=e289]: Everything you need to know about how Stumbnail fits into a thumbnail workflow.
        - generic [ref=e290]:
          - generic [ref=e291]:
            - button "What does your thumbnail creator actually do?" [ref=e292] [cursor=pointer]:
              - generic [ref=e293]: What does your thumbnail creator actually do?
              - img [ref=e295]
            - paragraph [ref=e297]: We're an AI YouTube thumbnail generator that turns your ideas into click-worthy visuals in seconds. Just describe what you want or paste your video title, and our AI generates a clean, creator-ready thumbnail. You can adjust colors, personas, text, and layout without starting over. It's built to give you fast results while keeping full creative control in your hands.
          - generic [ref=e298]:
            - button "Do I need design skills to use this?" [ref=e299] [cursor=pointer]:
              - generic [ref=e300]: Do I need design skills to use this?
              - img [ref=e302]
            - paragraph [ref=e304]: Not at all. The whole point is that you don't need to know Photoshop or spend hours learning design software. If you can type a sentence, you can make a thumbnail. Our thumbnail maker AI handles the heavy lifting like composition, style, and readability so you can focus on your content.
          - generic [ref=e305]:
            - button "What's the right YouTube thumbnail size?" [ref=e306] [cursor=pointer]:
              - generic [ref=e307]: What's the right YouTube thumbnail size?
              - img [ref=e309]
            - paragraph [ref=e311]: The recommended YouTube thumbnail size is 1280 × 720 pixels with a 16:9 aspect ratio. This is the standard that YouTube expects, and all thumbnails we generate follow this spec automatically. You don't need to resize anything. What you download is ready to upload.
          - generic [ref=e312]:
            - button "Can I generate a thumbnail from my video?" [ref=e313] [cursor=pointer]:
              - generic [ref=e314]: Can I generate a thumbnail from my video?
              - img [ref=e316]
            - paragraph [ref=e318]: Yes. You can generate a thumbnail from video by giving us context about what your video covers. Describe the topic, the vibe, or paste your title and we'll create a thumbnail that fits. You're not limited to screenshots; you get original, AI-generated visuals designed for clicks.
          - generic [ref=e319]:
            - button "Do you offer a free plan?" [ref=e320] [cursor=pointer]:
              - generic [ref=e321]: Do you offer a free plan?
              - img [ref=e323]
            - paragraph [ref=e325]: We’ve discontinued the free tier. With our small budget, we couldn’t fund it anymore, so we can’t keep providing free credits. We’re really sorry. You’re still welcome to try Stumbnail with a paid plan.
          - generic [ref=e326]:
            - button "Can I use this for gaming thumbnails?" [ref=e327] [cursor=pointer]:
              - generic [ref=e328]: Can I use this for gaming thumbnails?
              - img [ref=e330]
            - paragraph [ref=e332]: Absolutely. We support gaming thumbnail creation for any game like Minecraft, Fortnite, Call of Duty, whatever you play. Just describe the scene or vibe you want, and the AI generates something that fits the energy of gaming content.
          - generic [ref=e333]:
            - button "Do you have thumbnail templates I can use?" [ref=e334] [cursor=pointer]:
              - generic [ref=e335]: Do you have thumbnail templates I can use?
              - img [ref=e337]
            - paragraph [ref=e339]: We take a different approach. Instead of static YouTube thumbnail templates, our AI generates fresh designs based on your input every time. This means your thumbnails don't look like everyone else's, and you're not stuck tweaking a template that doesn't quite fit.
          - generic [ref=e340]:
            - button "Can I add text to my thumbnails?" [ref=e341] [cursor=pointer]:
              - generic [ref=e342]: Can I add text to my thumbnails?
              - img [ref=e344]
            - paragraph [ref=e346]: Yes. Our thumbnail text generator lets you add bold, readable text directly on your thumbnail. You control the wording, size, and placement. The AI suggests layouts that keep text legible even at small sizes because that's where most people see thumbnails first.
          - generic [ref=e347]:
            - button "How is this different from Canva or Photoshop?" [ref=e348] [cursor=pointer]:
              - generic [ref=e349]: How is this different from Canva or Photoshop?
              - img [ref=e351]
            - paragraph [ref=e353]: Canva and Photoshop are general design tools. We're built specifically for YouTube creators. Our AI thumbnail maker understands what makes thumbnails click like faces, contrast, and text placement, then generates designs with that in mind. No templates to dig through, no learning curve. Just describe and generate.
